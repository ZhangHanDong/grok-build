[book]
title = "AI Coding Agent 架构解剖：从 Grok Build 源码看终端智能体的设计与实现"
authors = ["Alex Zhang"]
language = "zh-CN"
src = "manuscript"

[build]
build-dir = "dist"

[output.html]
default-theme = "rust"
git-repository-url = "https://github.com/xai-org/grok-build"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
